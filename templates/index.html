<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>外刊精读 — Foreign Journal Reader</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;0,800;1,400;1,600&family=Source+Serif+4:ital,opsz,wght@0,8..60,300;0,8..60,400;0,8..60,600;1,8..60,400&family=Noto+Serif+SC:wght@400;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>

  <!-- ═══ HEADER ═══ -->
  <header class="site-header">
    <div class="header-inner">
      <div class="header-left">
        <h1 class="site-title" onclick="showView('home')">
          <span class="title-en">Foreign Journal Reader</span>
          <span class="title-zh">外刊精读</span>
        </h1>
      </div>
      <nav class="header-nav">
        <button class="nav-btn active" data-view="home" onclick="showView('home')">
          <span class="nav-icon">◈</span> 今日推荐
        </button>
        <button class="nav-btn" data-view="starred" onclick="showView('starred')">
          <span class="nav-icon">&#9733;</span> 我的收藏
        </button>
        <button class="nav-btn" data-view="history" onclick="showView('history')">
          <span class="nav-icon">◷</span> 历史存档
        </button>
        <button class="nav-btn" data-view="paste" onclick="showView('paste')">
          <span class="nav-icon">✎</span> 粘贴精读
        </button>
        <button class="nav-btn" data-view="vocabulary" onclick="showView('vocabulary')">
          <span class="nav-icon">▤</span> 生词本
        </button>
      </nav>
    </div>
  </header>

  <!-- ═══ HOME VIEW ═══ -->
  <main id="view-home" class="view active">
    <section class="hero">
      <div class="hero-inner">
        <p class="hero-date" id="today-date"></p>
        <h2 class="hero-title">Today's Reading</h2>
        <p class="hero-subtitle">精选真实外刊文章，每日深度精读</p>
      </div>
    </section>
    <section class="articles-section">
      <div class="articles-grid" id="articles-grid">
        <div class="loading-state">
          <div class="loader"></div>
          <p>正在获取今日文章...</p>
        </div>
      </div>
    </section>
  </main>

  <!-- ═══ HISTORY VIEW ═══ -->
  <main id="view-history" class="view">
    <section class="history-section">
      <div class="history-inner">
        <h2 class="section-title">历史存档</h2>
        <p class="section-desc">按日期浏览往期精读文章，每天的推荐都会自动归档</p>
        <div class="history-list" id="history-list">
          <div class="loading-state"><div class="loader"></div><p>加载中...</p></div>
        </div>
      </div>
    </section>
  </main>

  <!-- ═══ STARRED VIEW ═══ -->
  <main id="view-starred" class="view">
    <section class="history-section">
      <div class="history-inner">
        <h2 class="section-title">我的收藏</h2>
        <p class="section-desc">你标记星标的文章，可以反复精读</p>
        <div class="history-list" id="starred-list">
          <div class="loading-state"><div class="loader"></div><p>加载中...</p></div>
        </div>
      </div>
    </section>
  </main>

  <!-- ═══ PASTE VIEW ═══ -->
  <main id="view-paste" class="view">
    <section class="paste-section">
      <div class="paste-inner">
        <h2 class="section-title">粘贴文章精读</h2>
        <p class="section-desc">将外刊文章粘贴到下方，系统将自动分析词汇、词组和句式</p>
        <div class="paste-form">
          <input type="text" id="paste-title" placeholder="文章标题（选填）" class="paste-input">
          <textarea id="paste-text" placeholder="在此粘贴英文文章原文..." class="paste-textarea" rows="12"></textarea>
          <button class="btn-analyze" onclick="analyzeText()">
            <span class="btn-text">开始精读分析</span>
            <span class="btn-loading" style="display:none">分析中...</span>
          </button>
        </div>
      </div>
    </section>
  </main>

  <!-- ═══ READER VIEW ═══ -->
  <main id="view-reader" class="view">
    <div class="reader-container">
      <div class="reader-toolbar">
        <button class="back-btn" onclick="goBack()">← 返回</button>
        <div class="toolbar-actions">
          <button class="toolbar-btn" id="btn-reading-progress" title="阅读进度">
            <span class="progress-text" id="reading-progress-text">0%</span>
          </button>
        </div>
      </div>

      <article class="reader-article">
        <header class="reader-header">
          <span class="reader-source" id="reader-source"></span>
          <h1 class="reader-title" id="reader-title"></h1>
          <div class="reader-meta" id="reader-meta"></div>
        </header>
        <div class="reader-body" id="reader-body"></div>
      </article>

      <aside class="reader-analysis" id="reader-analysis">
        <div class="analysis-tabs">
          <button class="tab-btn active" data-tab="vocab" onclick="switchTab('vocab')">
            核心词汇 <span class="tab-count" id="count-vocab"></span>
          </button>
          <button class="tab-btn" data-tab="phrases" onclick="switchTab('phrases')">
            高级词组 <span class="tab-count" id="count-phrases"></span>
          </button>
          <button class="tab-btn" data-tab="patterns" onclick="switchTab('patterns')">
            长难句解读 <span class="tab-count" id="count-patterns"></span>
          </button>
        </div>

        <div class="tab-content active" id="tab-vocab"></div>
        <div class="tab-content" id="tab-phrases"></div>
        <div class="tab-content" id="tab-patterns"></div>
      </aside>
    </div>
  </main>

  <!-- ═══ VOCABULARY VIEW ═══ -->
  <main id="view-vocabulary" class="view">
    <section class="vocab-section">
      <div class="vocab-inner">
        <h2 class="section-title">我的生词本</h2>
        <p class="section-desc">在精读过程中收藏的词汇和词组</p>
        <div class="vocab-list" id="vocab-list">
          <div class="empty-state">
            <p class="empty-icon">&#9733;</p>
            <p>还没有收藏的词汇</p>
            <p class="empty-hint">在精读文章时，点击词汇卡片上的「收藏」按钮即可添加</p>
          </div>
        </div>
      </div>
    </section>
  </main>

  <!-- ═══ POPUP TOOLTIP ═══ -->
  <div class="word-tooltip" id="word-tooltip" style="display:none">
    <div class="tooltip-header">
      <span class="tooltip-word" id="tooltip-word"></span>
      <span class="tooltip-phonetic" id="tooltip-phonetic"></span>
    </div>
    <div class="tooltip-chinese" id="tooltip-chinese"></div>
    <div class="tooltip-def" id="tooltip-def"></div>
  </div>

  <footer class="site-footer">
    <p>外刊精读 — 每日一篇，积少成多</p>
  </footer>

  <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
